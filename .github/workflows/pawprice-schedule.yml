name: PawPrice Scheduled Jobs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 5 * * *'
    - cron: '0 12 * * *'

jobs:
  fetch-check-send:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RAKUTEN_APPLICATION_ID: ${{ secrets.RAKUTEN_APPLICATION_ID }}
      RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
      RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
      RAKUTEN_API_BASE_URL: ${{ secrets.RAKUTEN_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Fetch Rakuten items
        run: npm run fetch:rakuten

      - name: Check notifications
        run: npm run check:notifications

      - name: Send notifications
        run: npm run send:notifications