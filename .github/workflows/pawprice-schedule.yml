name: PawPrice Scheduled Jobs

on:
  workflow_dispatch:
  schedule:
    # JST 08:00, 14:00, 21:00 に動かす例
    # GitHub Actions の cron は UTC
    - cron: '0 23 * * *'   # JST 08:00
    - cron: '0 5 * * *'    # JST 14:00
    - cron: '0 12 * * *'   # JST 21:00

jobs:
  fetch-check-send:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RAKUTEN_APPLICATION_ID: ${{ secrets.RAKUTEN_APPLICATION_ID }}
      RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
      RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
      RAKUTEN_API_BASE_URL: ${{ secrets.RAKUTEN_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Fetch Rakuten items
        run: npm run fetch:rakuten

      - name: Check notifications
        run: npm run check:notifications

      - name: Send notifications
        run: npm run send:notifications