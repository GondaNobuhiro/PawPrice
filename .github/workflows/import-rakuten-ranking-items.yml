name: Discover Rakuten Products

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  discover-products:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RAKUTEN_APPLICATION_ID: ${{ secrets.RAKUTEN_APPLICATION_ID }}
      RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
      RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
      RAKUTEN_API_BASE_URL: ${{ secrets.RAKUTEN_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Discover new products
        run: npm run discover:products